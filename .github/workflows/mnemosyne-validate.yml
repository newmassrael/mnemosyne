name: mnemosyne-validate

# Phase 0 self-application (Round 79 OPTION C carry). Mnemosyne dogfoods
# its own validate-workspace + validate-code-refs on every push / PR.
# (The atomic store + GENERATED.md are the workspace docs; DESIGN.md was
# retired in Round 251.)

on:
 push:
 branches: [main]
 pull_request:

concurrency:
 group: ${{ github.workflow }}-${{ github.ref }}
 cancel-in-progress: true

jobs:
 validate:
 runs-on: ubuntu-latest
 timeout-minutes: 30
 steps:
 - uses: actions/checkout@v4

 - name: Install rust toolchain (rust-toolchain.toml)
 run: rustup show

 - name: Cache cargo
 uses: actions/cache@v4
 with:
  path: |
 ~/.cargo/registry
 ~/.cargo/git
 target
  key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
  restore-keys: |
 ${{ runner.os }}-cargo-

 - name: cargo test --workspace
 run: cargo test --workspace --locked

 - name: mnemosyne-cli validate-workspace
 run: cargo run --release -q -p mnemosyne-cli -- validate-workspace

 - name: mnemosyne-cli validate-code-refs (Round 257 Stage 2)
 # Subcommand skips when [plugins.set_equality_validator] is
 # unconfigured; when configured with severity_missing = "reject",
 # missing citations fail the build.
 run: cargo run --release -q -p mnemosyne-cli -- validate-code-refs
