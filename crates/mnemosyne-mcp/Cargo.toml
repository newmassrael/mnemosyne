[package]
name = "mnemosyne-mcp"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
publish.workspace = true
license.workspace = true

[[bin]]
name = "mnemosyne-mcp"
path = "src/main.rs"

[dependencies]
mnemosyne-validator = { path = "../mnemosyne-validator" }
rmcp = { version = "1.6", features = ["server", "transport-io", "macros"] }
schemars = "1"
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { version = "1", features = ["macros", "rt-multi-thread", "io-std", "io-util", "signal", "process"] }
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[lints]
workspace = true
