# Mnemosyne — workspace config (Round 142 WORKSPACE-CONFIG-ABSTRACTION).
#
# Phase 0e generic library extraction: this file pulls out what used to be
# hardcoded in `crates/mnemosyne-cli/src/main.rs::WORKSPACE_DOC_PATHS` and
# `crates/mnemosyne-validator/src/workspace.rs::MNEMOSYNE_DEFAULT_DOC`.
#
# External users author their own `mnemosyne.toml` with the same shape; the
# Mnemosyne self-application is now the first dogfood consumer of the
# generic loader (round-tripped through the same code path external users
# hit). Round 148 self-application re-import via generic ratifies this.
#
# Schema:
# workspace.docs ordered list of doc paths (workspace-relative)
# workspace.default_doc default cross-doc reclassify target (member of docs)
# workspace.root optional root override (default = config file's dir)

[workspace]
# Round 251 — atomic store = sole source of truth post MD-DELETION-RATIFY.
# GENERATED.md is the only readable artifact (derived from the atomic
# sidecar). The 7 source markdowns (DESIGN/ARCHITECTURE/CONCEPTS/ROADMAP/
# VISION/PRIOR_ART/README) were deleted in Round 251 — atomic store mutate
# API is the canonical authoring surface.
docs = [
 "docs/GENERATED.md",
]
default_doc = "docs/GENERATED.md"

# Round 143 — schema-as-input. The 4 entity types (Section / CrossRef /
# ChangelogEntry / FrozenList) are fixed primitives; this section configures
# *which markdown patterns* the parser maps onto them. External users
# override `[schema]` to fit their conventions; Mnemosyne's self-application
# below is the design_doc preset (first dogfood consumer).
#
# Round 144 — entry_id_prefix + anchor_convention plug-in (parser side).
# `entry_id_prefix` is the literal string that opens a ChangelogEntry top
# bullet (Mnemosyne = "Round ", ADR-style = "ADR-"); the parser captures
# the digits + dot-separator chain that follows.
# `anchor_convention` is a diagnostic label for the section anchor format
# (Mnemosyne = "section_number" for `§N`, ADR = "adr_id" for `ADR-NNNN`).
[schema]
changelog_titles = ["Changelog", "changelog"]
entry_id_prefix = "Round "
anchor_convention = "section_number"
medium_name = "design_doc"

# Round 145 — style rule i18n + threshold tuning. `locale` selects the
# sentence-boundary recognition profile. `thresholds` overrides per-rule
# char-count caps without forking the validator (deeper locale wiring +
# additional rule overrides land in Round 145+ as needed).
[style]
locale = "en"
[style.thresholds]
max_paragraph_length = 1000
max_sentence_length = 300
max_section_body_length = 5000

# Round 145 — workspace terminology glossary (canonical → variant list).
# Round 130 measurement-driven inventory + Round 132 conservative carry —
# `Salsa`/`salsa` and `bi-temporal`/`bitemporal` are unambiguous case /
# spelling errors. External users override with project-specific terms.
[terminology.glossary]
"Salsa" = ["salsa"]
"bi-temporal" = ["bitemporal"]

# Round 263 — code citation defense full reject. Path scope = production
# `src/` only. Both severities at "reject" after Round 263 cleanup brought
# src/ surface to 0:
# - 8 ImplementationUnbacked → §slug binding markers added
# - 192 src/ hallucination violations → comment-only sed transforms
#   (Round NNN + legacy §digit tokens dropped, design rationale prose
#   preserved) plus extractor improvements (placeholder + backtick skip).
# `comment_only = true` keeps the Round 262 precision layer.
#
# Round 264 — tests/ permanent exclusion (policy decision, not deferral).
# tests/ doc-comments and src/ comments are different assets:
# - src/ comments = future-change rationale; hallucinated round refs cause
#   silent corruption (a future reader edits code on bogus authority).
# - tests/ comments = traceability anchors ("this assertion was added in
#   Round N to guard regression X"); legitimate round-citation density is
#   higher and the corruption risk is lower (tests verify behavior, they
#   don't carry decision authority forward).
# Empirical Option D dry-run (Round 264) measured 373 violations across 35
# test files — all real comment citations (comment_only correctly excluded
# fixture string literals). Forcing the same automation onto tests/ would
# either bloat orphan_ledger by ~100-373 rows (diluting the ledger's "real
# exception" semantics) or strip prose-meaningful traceability anchors.
# tests/ stays out of [code_refs].paths; review-time human judgment carries
# the residual policing duty. Cross-asset symmetry is sacrificed deliberately
# in favor of single-responsibility per asset class.
[code_refs]
paths = [
 "crates/mnemosyne-cascade/src/",
 "crates/mnemosyne-cli/src/",
 "crates/mnemosyne-core/src/",
 "crates/mnemosyne-mcp/src/",
 "crates/mnemosyne-server/src/",
 "crates/mnemosyne-store/src/",
 "crates/mnemosyne-validator/src/",
]
severity_missing = "reject"
severity_binding = "reject"
comment_only = true
